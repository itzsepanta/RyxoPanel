    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        }

        @keyframes float {

            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse-ring {
            0% {

                opacity: 0.7;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.7;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes rotateSlow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes bounce-in {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.05);
            }

            70% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        .pulse-ring {
            animation: pulse-ring 2s ease-in-out infinite;
        }

        .shimmer-text {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .rotate-slow {
            animation: rotateSlow 20s linear infinite;
        }

        .bounce-in {
            animation: bounce-in 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.3;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.2);
            top: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: rgba(139, 92, 246, 0.2);
            bottom: -50px;
            left: -50px;
            animation: float 6s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 150px;
            height: 150px;
            background: rgba(59, 130, 246, 0.15);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-ring 4s ease-in-out infinite;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-dot.active {
            background: #10b981;
            animation: pulse-ring 1.5s ease-in-out infinite;
        }

        .input-glow:focus {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }

        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.4);
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>

    <script>
        function createParticles() {
            const container = document.getElementById('particles-container');
            const count = 20;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                const duration = Math.random() * 20 + 15;
                const delay = Math.random() * 20;
                const left = Math.random() * 100;
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${left}%;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    opacity: ${Math.random() * 0.3 + 0.1};
                `;
                container.appendChild(particle);
            }
        }
        createParticles();

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function toggleToken() {
            const tokenInput = document.getElementById('apiToken');
            const eyeIcon = document.getElementById('eyeIcon');

            if (tokenInput.type === 'password') {
                tokenInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                tokenInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }

        async function startDeploy() {
            const token = document.getElementById('apiToken').value.trim();
            const btn = document.getElementById('deployBtn');
            const statusContainer = document.getElementById('status-container');
            const statusText = document.getElementById('status-text');
            const statusPct = document.getElementById('status-pct');
            const progressBar = document.getElementById('progressBar');
            const errorBox = document.getElementById('error-box');

            const oldText = document.getElementById('successTxt');
            if (oldText) oldText.remove();

            const oldSuccessLink = document.getElementById('successBtn');
            if (oldSuccessLink) oldSuccessLink.remove();

            if (!token) {
                errorBox.classList.remove('hidden');
                errorBox.innerText = 'Please enter your token first.';
                errorBox.className = 'mt-4 p-4 bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-900/30 rounded-xl text-sm text-red-600 dark:text-red-400 text-center font-medium fade-in';
                return;
            }

            errorBox.classList.add('hidden');
            btn.disabled = true;
            document.getElementById('apiToken').disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            statusContainer.classList.remove('hidden');
            statusContainer.className = 'mt-4 bg-gray-50 dark:bg-zinc-900/50 rounded-xl p-4 border border-gray-200 dark:border-zinc-800/80 fade-in';

            statusText.innerHTML = '<span class="status-dot active"></span> Verifying token...';
            statusPct.innerText = '15%';
            progressBar.style.width = '15%';
            await sleep(500);

            statusText.innerHTML = '<span class="status-dot active"></span> Connecting to Cloudflare...';
            statusPct.innerText = '30%';
            progressBar.style.width = '30%';
            await sleep(500);

            statusText.innerHTML = '<span class="status-dot active"></span> Creating D1 database...';
            statusPct.innerText = '50%';
            progressBar.style.width = '50%';

            try {
                const response = await fetch('/api/deploy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                // Check if response is ok
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error('HTTP ' + response.status + ': ' + text.substring(0, 100));
                }

                statusText.innerHTML = '<span class="status-dot active"></span> Fetching Ryxo panel...';
                statusPct.innerText = '75%';
                progressBar.style.width = '75%';
                await sleep(600);

                statusText.innerHTML = '<span class="status-dot active"></span> Activating link...';
                statusPct.innerText = '90%';
                progressBar.style.width = '90%';
                await sleep(500);

                // Clone response before reading
                const responseClone = response.clone();
                let result;
                try {
                    result = await response.json();
                } catch (e) {
                    // If JSON parsing fails, get text from clone
                    const text = await responseClone.text();
                    throw new Error('Server returned: ' + text.substring(0, 200));
                }

                if (result.success) {
                    progressBar.style.width = '100%';
                    statusPct.innerText = '100%';
                    statusText.innerHTML = '<span class="status-dot active"></span> Completed!';
                    await sleep(400);

                    statusContainer.classList.add('hidden');

                    const successText = document.createElement('div');
                    successText.id = 'successTxt';
                    successText.className = 'text-center mt-6 font-bold text-sm text-emerald-600 dark:text-emerald-400 bounce-in';
                    successText.innerText = '✅ Panel deployed successfully!';
                    document.getElementById('mainCard').appendChild(successText);

                    const successLink = document.createElement('a');
                    successLink.href = result.url;
                    successLink.target = '_blank';
                    successLink.className = 'block w-full py-3.5 mt-3 btn-primary text-white text-center font-bold rounded-xl transition duration-300 shadow-lg shadow-blue-500/25 relative overflow-hidden group';
                    successLink.id = 'successBtn';
                    successLink.innerHTML = '<span class="relative z-10">Open Panel</span><span class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></span>';

                    document.getElementById('mainCard').appendChild(successLink);
                } else {
                    throw new Error(result.error || 'Unknown error');
                }
            } catch (e) {
                statusContainer.classList.add('hidden');
                errorBox.classList.remove('hidden');

                btn.disabled = false;
                document.getElementById('apiToken').disabled = false;
                btn.innerHTML = 'Deploy Panel';

                const errorMsg = e.message;

                // Check if it's a 404 or connection error
                if (errorMsg.includes('404') || errorMsg.includes('Not Found')) {
                    errorBox.innerHTML = '<div class="mb-2 font-bold">⚠️ Worker endpoint not found! (404)</div>' +
                        '<div class="text-[11px] opacity-70 mb-3">Make sure you are running this page on the correct Cloudflare Worker URL.</div>' +
                        '<div class="text-[11px] opacity-50 mb-3" dir="ltr">' + errorMsg + '</div>' +
                        '<div class="text-[11px] text-blue-400 mt-2">Try: <span class="font-mono">/api/deploy</span> endpoint might be missing</div>';
                }
                else if (errorMsg.includes('databases per account') || errorMsg.includes('limit reached')) {
                    errorBox.innerHTML = '<div class="mb-2 font-bold">You have reached the D1 database limit.</div>' +
                        '<div class="text-[11px] opacity-70 mb-3" dir="ltr">' + errorMsg + '</div>' +
                        '<a href="https://dash.cloudflare.com/?to=/:account/workers/d1" target="_blank" class="inline-block bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-xs transition hover:scale-105">Manage Databases</a>';
                }
                else if (errorMsg.includes('script limit') || errorMsg.includes('scripts per account')) {
                    errorBox.innerHTML = '<div class="mb-2 font-bold">You have reached the Workers script limit.</div>' +
                        '<div class="text-[11px] opacity-70 mb-3" dir="ltr">' + errorMsg + '</div>' +
                        '<a href="https://dash.cloudflare.com/?to=/:account/workers/services" target="_blank" class="inline-block bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-xs transition hover:scale-105">Manage Workers</a>';
                }
                else if (errorMsg.includes('Account not found') || errorMsg.includes('Authentication') || errorMsg.includes('Invalid')) {
                    errorBox.innerHTML = '<div class="mb-2 font-bold">Invalid token or insufficient permissions.</div>' +
                        '<div class="text-[11px] opacity-70 mb-3" dir="ltr">' + errorMsg + '</div>' +
                        '<a href="https://dash.cloudflare.com/profile/api-tokens" target="_blank" class="inline-block bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-xs transition hover:scale-105">Manage Tokens</a>';
                }
                else {
                    errorBox.innerHTML = '<div class="mb-2 font-bold">Error:</div>' +
                        '<div class="text-[11px] opacity-70" dir="ltr">' + errorMsg + '</div>';
                }
                errorBox.className = 'mt-4 p-4 bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-900/30 rounded-xl text-sm text-red-600 dark:text-red-400 text-center font-medium fade-in';
            }
        }
    </script>
</body>

</html>
